# Enable mouse
set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'dracula/tmux'
# set -g @plugin 'jimeh/tmux-themepack'
# set -g @themepack 'powerline/default/blue'

# Continuum injects its autosave command into status-right, so keep it after
# themes that rewrite the status line.
set -g @plugin 'tmux-plugins/tmux-continuum'


# Config Dracula Theme
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-left-icon session
set -g @dracula-show-powerline true
set -g @dracula-border-contrast true
set -g @dracula-show-weather false
set -g @dracula-show-network false
set -g @dracula-show-battery false
set -g @dracula-cpu-usage true
set -g @dracula-ram-usage true
set -g @dracula-show-flags true

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Set 256 colors and advertise truecolor support to applications inside tmux.
set -g default-terminal 'tmux-256color'
set -as terminal-features ',xterm-256color:RGB,tmux-256color:RGB,screen-256color:RGB,alacritty:RGB,kitty:RGB,wezterm:RGB,ghostty:RGB'
set -as terminal-overrides ',xterm-256color:Tc,tmux-256color:Tc,screen-256color:Tc,alacritty:Tc,kitty:Tc,wezterm:Tc,ghostty:Tc'

run '~/.tmux/plugins/tpm/tpm'
